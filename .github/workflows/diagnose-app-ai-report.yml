name: Diagnose app-ai report

on:
  workflow_dispatch:
    inputs:
      report_id:
        description: Report ID to inspect
        required: true
        default: "6"
        type: string

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: app-ai-production

    steps:
      - name: Inspect filtered app-ai logs over SSH
        env:
          REPORT_ID: ${{ inputs.report_id }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          [[ "$REPORT_ID" =~ ^[1-9][0-9]*$ ]]
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$SSH_USER@$SSH_HOST" bash -s -- "$REPORT_ID" <<'REMOTE_LOGS'
          set -euo pipefail

          report_id="$1"
          container_id="$(sudo docker ps --filter 'label=com.docker.compose.service=app-ai' --format '{{.ID}}' | head -n 1)"
          test -n "$container_id"
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT
          sudo docker logs --since 2h "$container_id" > "$log_file" 2>&1

          if grep -Eq "reportId=${report_id}([[:space:]]|$)|/reports/${report_id}/review" "$log_file"; then
            grep -E -C 8 "reportId=${report_id}([[:space:]]|$)|/reports/${report_id}/review" "$log_file" | tail -n 240
          else
            echo "No app-ai log entries found for reportId=${report_id} in the last two hours."
          fi
          REMOTE_LOGS
