name: Investigate report pipeline

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/investigate-report-6.yml"
  workflow_dispatch:
    inputs:
      report_id:
        description: Report ID to inspect
        required: true
        default: "6"
        type: string

permissions:
  contents: read

jobs:
  app-main:
    name: Inspect app-main report pipeline
    runs-on: ubuntu-latest
    environment: app-main-production
    steps:
      - name: Read filtered report logs and state over SSH
        env:
          REPORT_ID: ${{ inputs.report_id || '6' }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          [[ "$REPORT_ID" =~ ^[1-9][0-9]*$ ]]
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$SSH_USER@$SSH_HOST" bash -s -- "$REPORT_ID" "$DEPLOY_PATH" <<'REMOTE_MAIN'
          set -euo pipefail
          report_id="$1"
          deploy_path="$2"
          container_id="$(sudo docker ps --filter 'label=com.docker.compose.service=app-main' --format '{{.ID}}' | head -n 1)"
          test -n "$container_id"

          echo '=== app-main feature flag ==='
          sudo docker inspect "$container_id" --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -E '^APP_AI_REPORT_ENABLED=' || true

          echo '=== app-main report pipeline logs (last 24h) ==='
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT
          sudo docker logs --since 24h "$container_id" > "$log_file" 2>&1
          if grep -Eq "reportId=${report_id}([[:space:]]|$)|report_id=${report_id}([[:space:]]|$)|/reports/${report_id}/review|event=report_ai_(feature_status|poll_failure|recovery_failure|expired_lease_recovered)" "$log_file"; then
            grep -E -C 10 "reportId=${report_id}([[:space:]]|$)|report_id=${report_id}([[:space:]]|$)|/reports/${report_id}/review|event=report_ai_(feature_status|poll_failure|recovery_failure|expired_lease_recovered)" "$log_file" | tail -n 500
          else
            echo "No matching app-main report pipeline log entries found for reportId=${report_id}."
          fi

          echo '=== report pipeline state ==='
          set -a
          . "$deploy_path/.env.runtime"
          set +a
          jdbc_target="${SPRING_DATASOURCE_URL#jdbc:postgresql://}"
          db_host_port="${jdbc_target%%/*}"
          db_name="${jdbc_target#*/}"
          db_name="${db_name%%\?*}"
          db_host="${db_host_port%:*}"
          db_port="${db_host_port##*:}"
          PGPASSWORD="$SPRING_DATASOURCE_PASSWORD" psql --no-psqlrc --set ON_ERROR_STOP=1 \
            -h "$db_host" -p "$db_port" -U "$SPRING_DATASOURCE_USERNAME" -d "$db_name" \
            -P footer=off -F ' | ' -c "
              SELECT report_id, status, ai_review_state, ai_attempts,
                     to_char(ai_next_attempt_at AT TIME ZONE 'Asia/Seoul', 'YYYY-MM-DD HH24:MI:SS') AS next_attempt_kst,
                     to_char(ai_lease_until AT TIME ZONE 'Asia/Seoul', 'YYYY-MM-DD HH24:MI:SS') AS lease_until_kst,
                     ai_last_error_code,
                     to_char(ai_reviewed_at AT TIME ZONE 'Asia/Seoul', 'YYYY-MM-DD HH24:MI:SS') AS reviewed_kst,
                     to_char(created_at AT TIME ZONE 'Asia/Seoul', 'YYYY-MM-DD HH24:MI:SS') AS created_kst
                FROM reports
               WHERE report_id = ${report_id};"
          REMOTE_MAIN

  app-ai:
    name: Inspect app-ai report pipeline
    runs-on: ubuntu-latest
    environment: app-ai-production
    steps:
      - name: Read filtered report logs over SSH
        env:
          REPORT_ID: ${{ inputs.report_id || '6' }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          [[ "$REPORT_ID" =~ ^[1-9][0-9]*$ ]]
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$SSH_USER@$SSH_HOST" bash -s -- "$REPORT_ID" <<'REMOTE_AI'
          set -euo pipefail
          report_id="$1"
          container_id="$(sudo docker ps --filter 'label=com.docker.compose.service=app-ai' --format '{{.ID}}' | head -n 1)"
          test -n "$container_id"

          echo '=== app-ai feature flag ==='
          sudo docker inspect "$container_id" --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -E '^APP_AI_FEATURES_REPORT_REVIEW_ENABLED=' || true

          echo '=== app-ai report review logs (last 24h) ==='
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT
          sudo docker logs --since 24h "$container_id" > "$log_file" 2>&1
          if grep -Eq "reportId=${report_id}([[:space:]]|$)|/reports/${report_id}/review" "$log_file"; then
            grep -E -C 10 "reportId=${report_id}([[:space:]]|$)|/reports/${report_id}/review" "$log_file" | tail -n 500
          else
            echo "No matching app-ai report review log entries found for reportId=${report_id}."
          fi
          REMOTE_AI
