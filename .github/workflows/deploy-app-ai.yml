name: Deploy app-ai

on:
  push:
    branches: ["main"]
    paths:
      - "app-ai/**"
      - "common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "db/migrations/**"
      - "deploy/app-ai/**"
      - "deploy/env/app-ai.env.example"
      - "deploy/scripts/apply-admin-dashboard-migrations.sh"
      - "deploy/scripts/bootstrap-docker.sh"
      - "deploy/scripts/deploy-compose.sh"
      - ".dockerignore"
      - ".github/workflows/deploy-app-ai.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-app-ai-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: app-ai-production

    steps:
      - name: Check out backend
        uses: actions/checkout@v4

      - name: Validate deployment source
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]]

      - name: Apply admin dashboard migrations over SSH
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          APP_AI_ENV_FILE: ${{ secrets.APP_AI_ENV_FILE }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          test -n "$APP_AI_ENV_FILE"
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$SSH_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ "$SSH_PORT" =~ ^[0-9]+$ ]]
          [[ "$DEPLOY_PATH" =~ ^/home/[A-Za-z0-9._/-]+$ ]]

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh_opts=(-i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          scp_opts=(-i "$HOME/.ssh/deploy_key" -P "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          remote="$SSH_USER@$SSH_HOST"

          ssh "${ssh_opts[@]}" "$remote" 'if ! command -v psql >/dev/null 2>&1; then sudo -n apt-get update && sudo -n env DEBIAN_FRONTEND=noninteractive apt-get install --yes postgresql-client; fi; command -v psql'
          ssh "${ssh_opts[@]}" "$remote" "install -d -m 700 '$DEPLOY_PATH/deploy/scripts' '$DEPLOY_PATH/db/migrations'"
          ssh "${ssh_opts[@]}" "$remote" bash -s -- "$DEPLOY_PATH" <<'REMOTE_DATASOURCE'
          set -euo pipefail

          deploy_path="$1"
          datasource_env="$deploy_path/.datasource.env"
          datasource_pattern='^SPRING_DATASOURCE_(URL|USERNAME|PASSWORD)='

          valid_datasource_file() {
            grep -E "$datasource_pattern" "$1" > "$datasource_env" || true
            [[ "$(wc -l < "$datasource_env")" == "3" ]]
            ! grep -Eq '^SPRING_DATASOURCE_URL=jdbc:postgresql://(localhost|127\.0\.0\.1)(:|/|$)' "$datasource_env"
          }

          if ! valid_datasource_file "$deploy_path/.env.runtime"; then
            container_id="$(sudo docker ps --filter 'label=com.docker.compose.service=app-ai' --format '{{.ID}}' | head -n 1)"
            test -n "$container_id"
            sudo docker inspect "$container_id" --format '{{range .Config.Env}}{{println .}}{{end}}' \
              | grep -E "$datasource_pattern" > "$datasource_env"
            [[ "$(wc -l < "$datasource_env")" == "3" ]]
            ! grep -Eq '^SPRING_DATASOURCE_URL=jdbc:postgresql://(localhost|127\.0\.0\.1)(:|/|$)' "$datasource_env"
          fi
          chmod 600 "$datasource_env"
          REMOTE_DATASOURCE
          runtime_env="$RUNNER_TEMP/app-ai.env.runtime"
          umask 077
          printf '%s' "$APP_AI_ENV_FILE" > "$runtime_env"
          test -s "$runtime_env"
          scp "${scp_opts[@]}" "$runtime_env" "$remote:$DEPLOY_PATH/.env.runtime.next"
          ssh "${ssh_opts[@]}" "$remote" "grep -v -E '^SPRING_DATASOURCE_(URL|USERNAME|PASSWORD)=' '$DEPLOY_PATH/.env.runtime.next' > '$DEPLOY_PATH/.env.runtime.merged' && cat '$DEPLOY_PATH/.datasource.env' >> '$DEPLOY_PATH/.env.runtime.merged' && chmod 600 '$DEPLOY_PATH/.env.runtime.merged' && mv '$DEPLOY_PATH/.env.runtime.merged' '$DEPLOY_PATH/.env.runtime' && rm -f '$DEPLOY_PATH/.env.runtime.next' '$DEPLOY_PATH/.datasource.env'"
          scp "${scp_opts[@]}" deploy/scripts/apply-admin-dashboard-migrations.sh "$remote:$DEPLOY_PATH/deploy/scripts/apply-admin-dashboard-migrations.sh"
          scp "${scp_opts[@]}" db/migrations/v24_seed_report_policy_rules.sql db/migrations/v25_user_auth_version.sql db/migrations/v25_web_push_subscriptions.sql db/migrations/v26_admin_audit_logs.sql db/migrations/v26_web_push_session_cardinality.sql db/migrations/v27_report_policy_sanction_durations.sql db/migrations/v28_chat_system_messages.sql db/migrations/v29_meeting_schedule_details.sql db/migrations/v30_report_schedule_target_enum.sql db/migrations/v31_report_schedule_target.sql db/migrations/v32_chat_message_reply.sql db/migrations/v33_question_ai_ungrounded_answer.sql db/migrations/v34_question_ai_ungrounded_answer_validate.sql db/migrations/v35_knowledge_relation_candidates.sql db/migrations/v36_meeting_schedule_date_time.sql db/migrations/v37_notification_i18n.sql db/migrations/v38_chat_notices.sql "$remote:$DEPLOY_PATH/db/migrations/"
          ssh "${ssh_opts[@]}" "$remote" \
            "chmod 700 '$DEPLOY_PATH/deploy/scripts/apply-admin-dashboard-migrations.sh' && chmod 600 '$DEPLOY_PATH/db/migrations/v24_seed_report_policy_rules.sql' '$DEPLOY_PATH/db/migrations/v25_user_auth_version.sql' '$DEPLOY_PATH/db/migrations/v25_web_push_subscriptions.sql' '$DEPLOY_PATH/db/migrations/v26_admin_audit_logs.sql' '$DEPLOY_PATH/db/migrations/v26_web_push_session_cardinality.sql' '$DEPLOY_PATH/db/migrations/v27_report_policy_sanction_durations.sql' '$DEPLOY_PATH/db/migrations/v28_chat_system_messages.sql' '$DEPLOY_PATH/db/migrations/v29_meeting_schedule_details.sql' '$DEPLOY_PATH/db/migrations/v30_report_schedule_target_enum.sql' '$DEPLOY_PATH/db/migrations/v31_report_schedule_target.sql' '$DEPLOY_PATH/db/migrations/v32_chat_message_reply.sql' '$DEPLOY_PATH/db/migrations/v33_question_ai_ungrounded_answer.sql' '$DEPLOY_PATH/db/migrations/v34_question_ai_ungrounded_answer_validate.sql' '$DEPLOY_PATH/db/migrations/v35_knowledge_relation_candidates.sql' '$DEPLOY_PATH/db/migrations/v36_meeting_schedule_date_time.sql' '$DEPLOY_PATH/db/migrations/v37_notification_i18n.sql' '$DEPLOY_PATH/db/migrations/v38_chat_notices.sql'"

          ssh "${ssh_opts[@]}" "$remote" bash -s -- "$DEPLOY_PATH" <<'REMOTE_MIGRATION'
          set -euo pipefail

          deploy_path="$1"
          MIGRATION_RUNTIME_ENV="$deploy_path/.env.runtime" \
            "$deploy_path/deploy/scripts/apply-admin-dashboard-migrations.sh"
          REMOTE_MIGRATION

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build app-ai
        run: ./gradlew :app-ai:bootJar --no-daemon

      - name: Refuse stale deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_run_id="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/deploy-app-ai.yml/runs?branch=main&per_page=1" \
            | jq -r '.workflow_runs[0].id')"
          [[ "$latest_run_id" == "$GITHUB_RUN_ID" ]]

      - name: Build and push image
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"
          image="docker.io/${DOCKERHUB_USERNAME}/ieum-app-ai:${GITHUB_SHA}"
          printf '%s' "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
          docker build --file deploy/app-ai/Dockerfile --tag "$image" .
          docker push "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          APP_AI_BIND_ADDRESS: ${{ vars.APP_AI_BIND_ADDRESS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$IMAGE"
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$SSH_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ "$SSH_PORT" =~ ^[0-9]+$ ]]
          [[ "$DEPLOY_PATH" =~ ^/home/[A-Za-z0-9._/-]+$ ]]
          [[ "$APP_AI_BIND_ADDRESS" =~ ^[0-9.]+$ ]]
          [[ "$APP_AI_BIND_ADDRESS" != "0.0.0.0" ]]

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh_opts=(-i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          scp_opts=(-i "$HOME/.ssh/deploy_key" -P "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          remote="$SSH_USER@$SSH_HOST"

          ssh "${ssh_opts[@]}" "$remote" "install -d -m 700 '$DEPLOY_PATH'"
          scp "${scp_opts[@]}" deploy/app-ai/compose.yml "$remote:$DEPLOY_PATH/compose.yml"
          scp "${scp_opts[@]}" deploy/scripts/bootstrap-docker.sh deploy/scripts/deploy-compose.sh "$remote:$DEPLOY_PATH/"

          # .env.runtime is managed manually on the server; fail early if it is missing.
          ssh "${ssh_opts[@]}" "$remote" "test -f '$DEPLOY_PATH/.env.runtime'" \
            || { echo "::error::.env.runtime missing at $DEPLOY_PATH on the server — create it manually (chmod 600)"; exit 1; }
          ssh "${ssh_opts[@]}" "$remote" "bash '$DEPLOY_PATH/bootstrap-docker.sh'"
          printf '%s\n' "$DOCKERHUB_TOKEN" | ssh "${ssh_opts[@]}" "$remote" \
            "sudo env APP_AI_BIND_ADDRESS='$APP_AI_BIND_ADDRESS' bash '$DEPLOY_PATH/deploy-compose.sh' app-ai '$IMAGE' '$DEPLOY_PATH' 'http://127.0.0.1:8081/actuator/health' '$DOCKERHUB_USERNAME'"
