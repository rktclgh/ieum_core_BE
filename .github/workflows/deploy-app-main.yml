name: Deploy app-main

on:
  push:
    branches: ["main"]
    paths:
      - "app-main/**"
      - "common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "db/migrations/**"
      - "deploy/app-main/**"
      - "deploy/env/app-main.env.example"
      - "deploy/nginx/**"
      - "deploy/scripts/**"
      - "deploy/scripts/apply-admin-dashboard-migrations.sh"
      - "deploy/tests/**"
      - ".dockerignore"
      - ".github/workflows/deploy-app-main.yml"
  repository_dispatch:
    types: ["frontend-updated"]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-app-main-production
  cancel-in-progress: false

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # NEXT_PUBLIC_* are client-public values (baked into the FE bundle at build time).
      # This job intentionally has no production Environment (security), and these vars are
      # Environment-scoped, so they resolve empty here — hardcode the public values instead.
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: 441362995465-k8mn1n445afshk62qplltc14qugiqdhi.apps.googleusercontent.com
      NEXT_PUBLIC_KAKAO_REST_API_KEY: 7f1952340d0bed2e27cbc84308af392b
    outputs:
      frontend_sha: ${{ steps.frontend-sha.outputs.sha }}
      artifact_id: ${{ steps.frontend-artifact.outputs.artifact-id }}

    steps:
      - name: Resolve frontend source
        id: frontend-source
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ github.event.client_payload.frontend_sha }}
        run: |
          if [[ "$EVENT_NAME" == "repository_dispatch" ]]; then
            [[ "$DISPATCH_SHA" =~ ^[0-9a-f]{40}$ ]]
            echo "ref=$DISPATCH_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out frontend
        uses: actions/checkout@v4
        with:
          repository: rktclgh/ieum_FE
          ref: ${{ steps.frontend-source.outputs.ref }}
          path: frontend
          persist-credentials: false

      - name: Verify frontend checkout
        id: frontend-sha
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ github.event.client_payload.frontend_sha }}
        run: |
          FRONTEND_SHA="$(git -C frontend rev-parse HEAD)"
          [[ "$FRONTEND_SHA" =~ ^[0-9a-f]{40}$ ]]
          if [[ "$EVENT_NAME" == "repository_dispatch" ]]; then
            [[ "$DISPATCH_SHA" == "$FRONTEND_SHA" ]]
          fi
          echo "sha=$FRONTEND_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build static frontend
        working-directory: frontend
        run: |
          test -n "$NEXT_PUBLIC_GOOGLE_CLIENT_ID"
          test -n "$NEXT_PUBLIC_KAKAO_REST_API_KEY"
          pnpm install --frozen-lockfile
          pnpm verify
          test -s out/index.html
          test -s out/index.txt
          test -s out/404.html

      - name: Prepare immutable frontend artifact
        env:
          FRONTEND_SHA: ${{ steps.frontend-sha.outputs.sha }}
        run: |
          artifact_root="$RUNNER_TEMP/frontend-static-artifact"
          test ! -e "$artifact_root"
          mkdir -p "$artifact_root/export"

          unsafe_entry="$(find frontend/out -mindepth 1 \( -name '.*' -o \( ! -type f -a ! -type d \) \) -print -quit)"
          if [[ -n "$unsafe_entry" ]]; then
            echo "::error::Unsafe frontend export entry: $unsafe_entry"
            exit 1
          fi

          cp -a frontend/out/. "$artifact_root/export/"
          printf '%s\n' "$FRONTEND_SHA" > "$artifact_root/frontend-sha"

      - name: Upload immutable frontend artifact
        id: frontend-artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static-${{ steps.frontend-sha.outputs.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/frontend-static-artifact
          if-no-files-found: error
          include-hidden-files: true
          overwrite: false
          retention-days: 1

  deploy:
    needs: frontend-build
    runs-on: ubuntu-latest
    environment: app-main-production

    steps:
      - name: Check out backend
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate deployment source
        if: github.event_name == 'push'
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]]

      - name: Download immutable frontend artifact
        uses: actions/download-artifact@v4
        with:
          artifact-ids: ${{ needs.frontend-build.outputs.artifact_id }}
          path: ${{ runner.temp }}/frontend-static-artifact
          merge-multiple: true

      - name: Verify downloaded frontend artifact
        env:
          EXPECTED_FRONTEND_SHA: ${{ needs.frontend-build.outputs.frontend_sha }}
        run: |
          artifact_root="$RUNNER_TEMP/frontend-static-artifact"
          test -d "$artifact_root/export"
          test -f "$artifact_root/frontend-sha"
          test ! -L "$artifact_root/frontend-sha"

          unsafe_entry="$(find "$artifact_root" -mindepth 1 \( -name '.*' -o \( ! -type f -a ! -type d \) \) -print -quit)"
          if [[ -n "$unsafe_entry" ]]; then
            echo "::error::Unsafe downloaded artifact entry: $unsafe_entry"
            exit 1
          fi

          [[ "$EXPECTED_FRONTEND_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$(wc -l < "$artifact_root/frontend-sha")" -eq 1 ]]
          artifact_frontend_sha="$(<"$artifact_root/frontend-sha")"
          [[ "$artifact_frontend_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$artifact_frontend_sha" == "$EXPECTED_FRONTEND_SHA" ]]
          deploy/tests/verify-static-frontend-package.sh "$artifact_root/export"

      - name: Package frontend into app-main
        run: |
          artifact_root="$RUNNER_TEMP/frontend-static-artifact"
          static_dir="app-main/src/main/resources/static"
          rm -rf "$static_dir"
          mkdir -p "$static_dir/error"
          cp -a "$artifact_root/export/." "$static_dir/"
          cp "$artifact_root/export/404.html" "$static_dir/error/404.html"
          test ! -e "$static_dir/out"
          test ! -e "$static_dir/.next"
          test -s "$static_dir/index.html"
          test -s "$static_dir/index.txt"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build app-main
        run: ./gradlew :app-main:bootJar --no-daemon

      - name: Verify packaged static frontend
        run: deploy/tests/verify-static-frontend-package.sh app-main/src/main/resources/static app-main/build/libs/app-main.jar

      - name: Apply admin dashboard migrations over SSH
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          APP_MAIN_ENV_FILE: ${{ secrets.APP_MAIN_ENV_FILE }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          test -n "$APP_MAIN_ENV_FILE"
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$SSH_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ "$SSH_PORT" =~ ^[0-9]+$ ]]
          [[ "$DEPLOY_PATH" =~ ^/home/[A-Za-z0-9._/-]+$ ]]

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh_opts=(-i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          scp_opts=(-i "$HOME/.ssh/deploy_key" -P "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          remote="$SSH_USER@$SSH_HOST"

          ssh "${ssh_opts[@]}" "$remote" 'if ! command -v psql >/dev/null 2>&1; then sudo -n apt-get update && sudo -n env DEBIAN_FRONTEND=noninteractive apt-get install --yes postgresql-client; fi; command -v psql'
          ssh "${ssh_opts[@]}" "$remote" "install -d -m 700 '$DEPLOY_PATH/deploy/scripts' '$DEPLOY_PATH/db/migrations'"
          ssh "${ssh_opts[@]}" "$remote" bash -s -- "$DEPLOY_PATH" <<'REMOTE_DATASOURCE'
          set -euo pipefail

          deploy_path="$1"
          datasource_env="$deploy_path/.datasource.env"
          datasource_pattern='^SPRING_DATASOURCE_(URL|USERNAME|PASSWORD)='

          valid_datasource_file() {
            grep -E "$datasource_pattern" "$1" > "$datasource_env" || true
            [[ "$(wc -l < "$datasource_env")" == "3" ]]
            ! grep -Eq '^SPRING_DATASOURCE_URL=jdbc:postgresql://(localhost|127\.0\.0\.1)(:|/|$)' "$datasource_env"
          }

          if ! valid_datasource_file "$deploy_path/.env.runtime"; then
            container_id="$(sudo docker ps --filter 'label=com.docker.compose.service=app-main' --format '{{.ID}}' | head -n 1)"
            test -n "$container_id"
            sudo docker inspect "$container_id" --format '{{range .Config.Env}}{{println .}}{{end}}' \
              | grep -E "$datasource_pattern" > "$datasource_env"
            [[ "$(wc -l < "$datasource_env")" == "3" ]]
            ! grep -Eq '^SPRING_DATASOURCE_URL=jdbc:postgresql://(localhost|127\.0\.0\.1)(:|/|$)' "$datasource_env"
          fi
          chmod 600 "$datasource_env"
          REMOTE_DATASOURCE
          runtime_env="$RUNNER_TEMP/app-main.env.runtime"
          umask 077
          printf '%s' "$APP_MAIN_ENV_FILE" > "$runtime_env"
          test -s "$runtime_env"
          scp "${scp_opts[@]}" "$runtime_env" "$remote:$DEPLOY_PATH/.env.runtime.next"
          ssh "${ssh_opts[@]}" "$remote" "grep -v -E '^SPRING_DATASOURCE_(URL|USERNAME|PASSWORD)=' '$DEPLOY_PATH/.env.runtime.next' > '$DEPLOY_PATH/.env.runtime.merged' && cat '$DEPLOY_PATH/.datasource.env' >> '$DEPLOY_PATH/.env.runtime.merged' && chmod 600 '$DEPLOY_PATH/.env.runtime.merged' && mv '$DEPLOY_PATH/.env.runtime.merged' '$DEPLOY_PATH/.env.runtime' && rm -f '$DEPLOY_PATH/.env.runtime.next' '$DEPLOY_PATH/.datasource.env'"
          scp "${scp_opts[@]}" deploy/scripts/apply-admin-dashboard-migrations.sh "$remote:$DEPLOY_PATH/deploy/scripts/apply-admin-dashboard-migrations.sh"
          scp "${scp_opts[@]}" db/migrations/v24_seed_report_policy_rules.sql db/migrations/v25_user_auth_version.sql db/migrations/v25_web_push_subscriptions.sql db/migrations/v26_admin_audit_logs.sql db/migrations/v26_web_push_session_cardinality.sql db/migrations/v27_report_policy_sanction_durations.sql db/migrations/v28_chat_system_messages.sql db/migrations/v29_meeting_schedule_details.sql db/migrations/v30_report_schedule_target_enum.sql db/migrations/v31_report_schedule_target.sql db/migrations/v32_chat_message_reply.sql db/migrations/v33_question_ai_ungrounded_answer.sql db/migrations/v34_question_ai_ungrounded_answer_validate.sql db/migrations/v35_knowledge_relation_candidates.sql "$remote:$DEPLOY_PATH/db/migrations/"
          ssh "${ssh_opts[@]}" "$remote" \
            "chmod 700 '$DEPLOY_PATH/deploy/scripts/apply-admin-dashboard-migrations.sh' && chmod 600 '$DEPLOY_PATH/db/migrations/v24_seed_report_policy_rules.sql' '$DEPLOY_PATH/db/migrations/v25_user_auth_version.sql' '$DEPLOY_PATH/db/migrations/v25_web_push_subscriptions.sql' '$DEPLOY_PATH/db/migrations/v26_admin_audit_logs.sql' '$DEPLOY_PATH/db/migrations/v26_web_push_session_cardinality.sql' '$DEPLOY_PATH/db/migrations/v27_report_policy_sanction_durations.sql' '$DEPLOY_PATH/db/migrations/v28_chat_system_messages.sql' '$DEPLOY_PATH/db/migrations/v29_meeting_schedule_details.sql' '$DEPLOY_PATH/db/migrations/v30_report_schedule_target_enum.sql' '$DEPLOY_PATH/db/migrations/v31_report_schedule_target.sql' '$DEPLOY_PATH/db/migrations/v32_chat_message_reply.sql' '$DEPLOY_PATH/db/migrations/v33_question_ai_ungrounded_answer.sql' '$DEPLOY_PATH/db/migrations/v34_question_ai_ungrounded_answer_validate.sql' '$DEPLOY_PATH/db/migrations/v35_knowledge_relation_candidates.sql'"

          ssh "${ssh_opts[@]}" "$remote" bash -s -- "$DEPLOY_PATH" <<'REMOTE_MIGRATION'
          set -euo pipefail

          deploy_path="$1"
          MIGRATION_RUNTIME_ENV="$deploy_path/.env.runtime" \
            "$deploy_path/deploy/scripts/apply-admin-dashboard-migrations.sh"
          REMOTE_MIGRATION

      - name: Refuse stale deployment
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_run_id="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/deploy-app-main.yml/runs?branch=main&per_page=1" \
            | jq -r '.workflow_runs[0].id')"
          [[ "$latest_run_id" == "$GITHUB_RUN_ID" ]]

      - name: Build and push image
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          FRONTEND_SHA: ${{ needs.frontend-build.outputs.frontend_sha }}
        run: |
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"
          image="docker.io/${DOCKERHUB_USERNAME}/ieum-app-main:${GITHUB_SHA}-fe-${FRONTEND_SHA}"
          printf '%s' "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
          docker build --file deploy/app-main/Dockerfile --tag "$image" .
          docker push "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Refuse stale frontend deployment
        env:
          CI_GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          FRONTEND_SHA: ${{ needs.frontend-build.outputs.frontend_sha }}
        run: |
          test -n "$CI_GITHUB_TOKEN"
          [[ "$FRONTEND_SHA" =~ ^[0-9a-f]{40}$ ]]
          latest_frontend_sha="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $CI_GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/rktclgh/ieum_FE/git/ref/heads/main" \
            | jq -r '.object.sha')"
          [[ "$latest_frontend_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$latest_frontend_sha" == "$FRONTEND_SHA" ]]

      - name: Deploy over SSH
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          APP_MAIN_PRIVATE_BIND_ADDRESS: ${{ vars.APP_MAIN_PRIVATE_BIND_ADDRESS }}
          LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$IMAGE"
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$SSH_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ "$SSH_PORT" =~ ^[0-9]+$ ]]
          [[ "$DEPLOY_PATH" =~ ^/home/[A-Za-z0-9._/-]+$ ]]
          [[ "$APP_MAIN_PRIVATE_BIND_ADDRESS" =~ ^[0-9.]+$ ]]
          [[ "$APP_MAIN_PRIVATE_BIND_ADDRESS" != "0.0.0.0" ]]
          if [[ -n "$LETSENCRYPT_EMAIL" ]]; then
            [[ "$LETSENCRYPT_EMAIL" =~ ^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$ ]]
          fi

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh_opts=(-i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          scp_opts=(-i "$HOME/.ssh/deploy_key" -P "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          remote="$SSH_USER@$SSH_HOST"

          ssh "${ssh_opts[@]}" "$remote" "install -d -m 700 '$DEPLOY_PATH' '$DEPLOY_PATH/nginx'"
          scp "${scp_opts[@]}" deploy/app-main/compose.yml "$remote:$DEPLOY_PATH/compose.yml"
          scp "${scp_opts[@]}" deploy/nginx/* "$remote:$DEPLOY_PATH/nginx/"
          scp "${scp_opts[@]}" deploy/scripts/bootstrap-docker.sh deploy/scripts/configure-host-redis.sh deploy/scripts/configure-nginx.sh deploy/scripts/deploy-compose.sh "$remote:$DEPLOY_PATH/"

          # .env.runtime is managed manually on the server; fail early if it is missing.
          ssh "${ssh_opts[@]}" "$remote" "test -f '$DEPLOY_PATH/.env.runtime'" \
            || { echo "::error::.env.runtime missing at $DEPLOY_PATH on the server — create it manually (chmod 600)"; exit 1; }
          ssh "${ssh_opts[@]}" "$remote" "bash '$DEPLOY_PATH/bootstrap-docker.sh'"
          ssh "${ssh_opts[@]}" "$remote" "sudo bash '$DEPLOY_PATH/configure-host-redis.sh' '$DEPLOY_PATH/.env.runtime'"
          ssh "${ssh_opts[@]}" "$remote" \
            "sudo bash '$DEPLOY_PATH/configure-nginx.sh' '$DEPLOY_PATH/nginx' '$LETSENCRYPT_EMAIL'"
          printf '%s\n' "$DOCKERHUB_TOKEN" | ssh "${ssh_opts[@]}" "$remote" \
            "sudo env APP_MAIN_PRIVATE_BIND_ADDRESS='$APP_MAIN_PRIVATE_BIND_ADDRESS' bash '$DEPLOY_PATH/deploy-compose.sh' app-main '$IMAGE' '$DEPLOY_PATH' 'http://127.0.0.1:8080/actuator/health' '$DOCKERHUB_USERNAME'"

          public_status="$(curl --location --silent --output /dev/null --write-out '%{http_code}' --max-time 20 https://ieum.rktclgh.site/ || true)"
          echo "Public endpoint status after internal health check: ${public_status:-000}"
          if [[ "$public_status" != "200" ]]; then
            echo "::warning::Public endpoint returned HTTP ${public_status:-000}; deployment succeeded because the private Actuator health check passed."
          fi
