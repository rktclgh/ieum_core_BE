name: Inspect app-main host Redis

on:
  push:
    branches: ["chore/inspect-host-redis"]
    paths: [".github/workflows/inspect-host-redis.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment: app-main-production
    steps:
      - name: Inspect non-secret Redis runtime state
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"

          ssh_opts=(-i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          ssh "${ssh_opts[@]}" "$SSH_USER@$SSH_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          config=/etc/redis/redis.conf

          printf 'redis_service='
          systemctl is-active redis-server 2>/dev/null || true
          printf 'redis_local_ping='
          redis-cli -h 127.0.0.1 -p 6379 ping 2>/dev/null || true
          printf 'docker_bridge_gateway='
          sudo docker network inspect bridge --format '{{(index .IPAM.Config 0).Gateway}}' 2>/dev/null || true
          printf 'redis_listener_count='
          sudo ss -ltn 'sport = :6379' | awk 'NR > 1 { count += 1 } END { print count + 0 }'

          if sudo test -r "$config"; then
            printf 'redis_bind='
            sudo awk '$1 == "bind" { print $2; exit }' "$config"
            printf 'redis_protected_mode='
            sudo awk '$1 == "protected-mode" { print $2; exit }' "$config"
            printf 'redis_requirepass='
            if sudo awk '$1 == "requirepass" { found = 1 } END { exit !found }' "$config"; then
              printf 'configured\n'
            else
              printf 'not_configured\n'
            fi
          else
            printf 'redis_config=unreadable\n'
          fi
          REMOTE
