map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name ieum.rktclgh.site;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ieum.rktclgh.site;

    ssl_certificate /etc/letsencrypt/live/ieum.rktclgh.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ieum.rktclgh.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 12m;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location ^~ /api/v1/internal/ {
        return 404;
    }

    location ^~ /actuator/ {
        return 404;
    }

    location = /actuator {
        return 404;
    }

    location ^~ /swagger-ui/ {
        return 404;
    }

    location = /swagger-ui {
        return 404;
    }

    location = /swagger-ui.html {
        return 404;
    }

    location ^~ /v3/api-docs/ {
        return 404;
    }

    location = /v3/api-docs {
        return 404;
    }

    location = /v3/api-docs.yaml {
        return 404;
    }

    location ~ ^/ws(?:/|$) {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    location ^~ /api/v1/sse/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        # Spring sends an SSE heartbeat every 15s; 75s allows five missed heartbeats.
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        gzip off;
        add_header X-Accel-Buffering no always;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
