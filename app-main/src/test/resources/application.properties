spring.datasource.url=jdbc:h2:mem:ieumtest;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test-password

app.jwt.secret=01234567890123456789012345678901
app.auth.email-verification-hmac-secret=01234567890123456789012345678901
app.auth.social.google.client-id=test-google-client-id
app.auth.social.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
app.auth.social.kakao.rest-api-key=test-kakao-rest-api-key
app.auth.social.kakao.client-secret=
app.auth.social.kakao.redirect-uris=http://localhost:3000/oauth/kakao/callback
app.auth.social.kakao.token-uri=https://kauth.kakao.com/oauth/token
app.auth.social.kakao.jwk-set-uri=https://kauth.kakao.com/.well-known/jwks.json
app.jwt.access-token-ttl-minutes=30
app.jwt.refresh-token-ttl-days=14
app.cookie.secure=false
app.cookie.same-site=Lax
app.cookie.domain=
app.cors.allowed-origins=http://localhost:3000
