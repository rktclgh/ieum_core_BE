spring.application.name=ieum-main
spring.config.import=optional:file:./app-main/.env[.properties],optional:file:./.env[.properties]
server.port=8080

# DB м ‘мҶҚ м •ліҙлҠ” м»Ён…Ңмқҙл„Ҳ нҷҳкІҪліҖмҲҳ(.env)лЎң мЈјмһ…н•ңлӢӨ.
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Postgres native enum мәҗмҠӨнҢ… нғҖмһ…лӘ…мқ„ snake_case лЎң л ҢлҚ”(мҳҲ: 'accepted'::friendship_status).
# кё°ліё PostgreSQLDialectлҠ” мһҗл°” нҒҙлһҳмҠӨлӘ…(FriendshipStatus)мқ„ к·ёлҢҖлЎң мҚЁ 42704 м—җлҹ¬к°Җ лӮңлӢӨ.
spring.jpa.properties.hibernate.dialect=shinhan.fibri.ieum.common.config.SnakeCasePostgreSQLDialect

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# SMTP
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# Auth
app.jwt.secret=${JWT_SECRET:}
app.auth.email-verification-hmac-secret=${EMAIL_VERIFICATION_HMAC_SECRET:}
app.auth.social.google.client-id=${GOOGLE_CLIENT_ID:}
app.auth.social.google.jwk-set-uri=${GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}
app.auth.social.kakao.rest-api-key=${KAKAO_REST_API_KEY:}
app.auth.social.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
app.auth.social.kakao.redirect-uris=${KAKAO_REDIRECT_URIS:}
app.auth.social.kakao.token-uri=${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
app.auth.social.kakao.jwk-set-uri=${KAKAO_JWK_SET_URI:https://kauth.kakao.com/.well-known/jwks.json}
app.jwt.access-token-ttl-minutes=${JWT_ACCESS_TOKEN_TTL_MINUTES:30}
app.jwt.refresh-token-ttl-days=${JWT_REFRESH_TOKEN_TTL_DAYS:14}
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}
app.cookie.domain=${COOKIE_DOMAIN:}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://ieum.rktclgh.site}

# Notification SSE
ieum.notification.sse.timeout-ms=1800000
ieum.notification.sse.max-conn-per-user=5
ieum.notification.sse.durable-queue-per-emitter=32
ieum.notification.sse.heartbeat-ms=15000
ieum.notification.sse.session-check-shards=4
ieum.notification.sse.retry-min-ms=3000
ieum.notification.sse.retry-max-ms=8000
ieum.notification.dispatch.core=4
ieum.notification.dispatch.max=16
ieum.notification.dispatch.queue=500
