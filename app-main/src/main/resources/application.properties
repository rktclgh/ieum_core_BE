spring.application.name=ieum-main
spring.config.import=optional:file:./app-main/.env[.properties],optional:file:./.env[.properties]
server.port=8080

# DB 접속 정보는 컨테이너 환경변수(.env)로 주입한다.
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate

# Postgres native enum 캐스팅 타입명을 snake_case 로 렌더(예: 'accepted'::friendship_status).
# 기본 PostgreSQLDialect는 자바 클래스명(FriendshipStatus)을 그대로 써 42704 에러가 난다.
spring.jpa.properties.hibernate.dialect=shinhan.fibri.ieum.common.config.SnakeCasePostgreSQLDialect
# SSE 같은 장기 비동기 요청이 EntityManager/JDBC 연결을 요청 종료까지 보유하지 않도록 한다.
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# SMTP
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
app.inquiry.admin-email=${INQUIRY_ADMIN_EMAIL}

# Auth
app.jwt.secret=${JWT_SECRET:}
app.auth.email-verification-hmac-secret=${EMAIL_VERIFICATION_HMAC_SECRET:}
app.auth.social.google.client-id=${GOOGLE_CLIENT_ID:}
app.auth.social.google.jwk-set-uri=${GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}
app.auth.social.kakao.rest-api-key=${KAKAO_REST_API_KEY:}
app.auth.social.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
app.auth.social.kakao.redirect-uris=${KAKAO_REDIRECT_URIS:}
app.auth.social.kakao.token-uri=${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
app.auth.social.kakao.jwk-set-uri=${KAKAO_JWK_SET_URI:https://kauth.kakao.com/.well-known/jwks.json}
app.jwt.access-token-ttl-minutes=${JWT_ACCESS_TOKEN_TTL_MINUTES:30}
app.jwt.refresh-token-ttl-days=${JWT_REFRESH_TOKEN_TTL_DAYS:14}
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}
app.cookie.domain=${COOKIE_DOMAIN:}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://ieum.rktclgh.site}

# Web Push subscription API and isolated delivery transport
app.web-push.enabled=${WEB_PUSH_ENABLED:false}
app.web-push.vapid-public-key=${WEB_PUSH_VAPID_PUBLIC_KEY:}
app.web-push.vapid-private-key=${WEB_PUSH_VAPID_PRIVATE_KEY:}
app.web-push.vapid-subject=${WEB_PUSH_VAPID_SUBJECT:}
app.web-push.connect-timeout=${WEB_PUSH_CONNECT_TIMEOUT:2s}
app.web-push.request-timeout=${WEB_PUSH_REQUEST_TIMEOUT:5s}
app.web-push.allowed-endpoint-hosts=${WEB_PUSH_ALLOWED_ENDPOINT_HOSTS:fcm.googleapis.com,push.services.mozilla.com,push.apple.com,notify.windows.com}
app.web-push.executor.threads=${WEB_PUSH_EXECUTOR_THREADS:2}
app.web-push.executor.queue=${WEB_PUSH_EXECUTOR_QUEUE:128}
app.web-push.executor.shutdown-seconds=${WEB_PUSH_EXECUTOR_SHUTDOWN_SECONDS:10}

# app-ai report review worker and internal client (disabled by default)
app.ai.report.enabled=${APP_AI_REPORT_ENABLED:false}
app.ai.report.base-url=${APP_AI_REPORT_BASE_URL:}
app.ai.report.allowed-hosts=${APP_AI_REPORT_ALLOWED_HOSTS:}
app.ai.report.connect-timeout-seconds=${APP_AI_REPORT_CONNECT_TIMEOUT_SECONDS:2}
app.ai.report.read-timeout-seconds=${APP_AI_REPORT_READ_TIMEOUT_SECONDS:90}
app.ai.report.worker-id=${APP_AI_REPORT_WORKER_ID:${HOSTNAME:local}-${random.uuid}}
app.ai.report.lease=${APP_AI_REPORT_LEASE:150s}
app.ai.report.max-attempts=${APP_AI_REPORT_MAX_ATTEMPTS:5}
app.ai.report.batch-size=${APP_AI_REPORT_BATCH_SIZE:32}
app.ai.report.image-presign-ttl=${APP_AI_REPORT_IMAGE_PRESIGN_TTL:5m}
app.ai.report.poll-delay-ms=${APP_AI_REPORT_POLL_DELAY_MS:1000}
app.ai.report.poll-initial-delay-ms=${APP_AI_REPORT_POLL_INITIAL_DELAY_MS:1000}
app.ai.report.recovery-interval-ms=${APP_AI_REPORT_RECOVERY_INTERVAL_MS:60000}
app.ai.report.recovery-initial-delay-ms=${APP_AI_REPORT_RECOVERY_INITIAL_DELAY_MS:60000}

# app-ai question answer ticket wake (single best-effort call after question commit)
app.ai.question-answer-dispatch.enabled=${APP_AI_QUESTION_ANSWER_DISPATCH_ENABLED:false}
app.ai.question-answer-dispatch.base-url=${APP_AI_QUESTION_ANSWER_DISPATCH_BASE_URL:}
app.ai.question-answer-dispatch.allowed-hosts=${APP_AI_QUESTION_ANSWER_DISPATCH_ALLOWED_HOSTS:}
app.ai.question-answer-dispatch.connect-timeout-seconds=${APP_AI_QUESTION_ANSWER_DISPATCH_CONNECT_TIMEOUT_SECONDS:2}
app.ai.question-answer-dispatch.read-timeout-seconds=${APP_AI_QUESTION_ANSWER_DISPATCH_READ_TIMEOUT_SECONDS:5}

# app-ai accepted human answer knowledge ingestion (single best-effort call after acceptance commit)
app.ai.accepted-answer-dispatch.enabled=${APP_AI_ACCEPTED_ANSWER_DISPATCH_ENABLED:false}
app.ai.accepted-answer-dispatch.base-url=${APP_AI_ACCEPTED_ANSWER_DISPATCH_BASE_URL:${APP_AI_QUESTION_ANSWER_DISPATCH_BASE_URL:}}
app.ai.accepted-answer-dispatch.allowed-hosts=${APP_AI_ACCEPTED_ANSWER_DISPATCH_ALLOWED_HOSTS:${APP_AI_QUESTION_ANSWER_DISPATCH_ALLOWED_HOSTS:}}
app.ai.accepted-answer-dispatch.connect-timeout-seconds=${APP_AI_ACCEPTED_ANSWER_DISPATCH_CONNECT_TIMEOUT_SECONDS:2}
app.ai.accepted-answer-dispatch.read-timeout-seconds=${APP_AI_ACCEPTED_ANSWER_DISPATCH_READ_TIMEOUT_SECONDS:5}

# app-ai -> app-main completion callback (server-to-server only)
app.ai.internal-callback-token=${APP_AI_INTERNAL_CALLBACK_TOKEN:}

# Place proxy
app.place.naver-search.base-url=${NAVER_SEARCH_BASE_URL:https://openapi.naver.com}
app.place.naver-search.client-id=${NAVER_SEARCH_CLIENT_ID:}
app.place.naver-search.client-secret=${NAVER_SEARCH_CLIENT_SECRET:}
app.place.ncp-maps.base-url=${NCP_MAPS_BASE_URL:https://maps.apigw.ntruss.com}
app.place.ncp-maps.key-id=${NCP_MAPS_KEY_ID:}
app.place.ncp-maps.key=${NCP_MAPS_KEY:}
app.place.http.connect-timeout-ms=${PLACE_CONNECT_TIMEOUT_MS:2000}
app.place.http.read-timeout-ms=${PLACE_READ_TIMEOUT_MS:3000}
app.place.http.max-concurrent=${PLACE_MAX_CONCURRENT:20}

# Translation proxy (server-side only)
app.translation.google.api-key=${GOOGLE_TRANSLATE_API_KEY:}
app.translation.google.connect-timeout-seconds=${GOOGLE_TRANSLATE_CONNECT_TIMEOUT_SECONDS:2}
app.translation.google.read-timeout-seconds=${GOOGLE_TRANSLATE_READ_TIMEOUT_SECONDS:5}

# Notification SSE
ieum.notification.sse.timeout-ms=1800000
ieum.notification.sse.max-conn-per-user=5
ieum.notification.sse.durable-queue-per-emitter=32
ieum.notification.sse.heartbeat-ms=15000
ieum.notification.sse.session-check-shards=4
ieum.notification.sse.retry-min-ms=3000
ieum.notification.sse.retry-max-ms=8000
ieum.notification.dispatch.core=4
ieum.notification.dispatch.max=16
ieum.notification.dispatch.queue=500
