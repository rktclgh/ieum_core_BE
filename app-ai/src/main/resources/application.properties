spring.application.name=ieum-ai
spring.config.import=optional:file:./app-ai/.env[.properties],optional:file:./.env[.properties]
server.port=${SERVER_PORT:8081}
app.ai.mode=${APP_AI_MODE:server}

# DB 접속 정보는 컨테이너 환경변수(.env)로 주입한다.
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.sql.init.mode=never

app.ai.database.embedding-dimensions=768
app.ai.database.required-extensions=vector,postgis,pgcrypto

app.ai.features.report-review-enabled=${APP_AI_FEATURES_REPORT_REVIEW_ENABLED:false}
app.ai.features.question-answer-enabled=${APP_AI_FEATURES_QUESTION_ANSWER_ENABLED:false}
app.ai.features.accepted-answer-ingestion-enabled=${APP_AI_FEATURES_ACCEPTED_ANSWER_INGESTION_ENABLED:false}
app.ai.features.accepted-answer-relation-candidates-enabled=${APP_AI_FEATURES_ACCEPTED_ANSWER_RELATION_CANDIDATES_ENABLED:false}
app.ai.features.web-grounding-enabled=${APP_AI_FEATURES_WEB_GROUNDING_ENABLED:false}
app.ai.features.ungrounded-answer-enabled=${APP_AI_FEATURES_UNGROUNDED_ANSWER_ENABLED:false}
app.ai.gemini-api-key=${APP_AI_GEMINI_API_KEY:}
app.ai.accepted-answer.task-lease=${APP_AI_ACCEPTED_ANSWER_TASK_LEASE:5m}
app.ai.accepted-answer.max-attempts=${APP_AI_ACCEPTED_ANSWER_MAX_ATTEMPTS:5}
app.ai.accepted-answer.redispatch-delay-seconds=${APP_AI_ACCEPTED_ANSWER_REDISPATCH_DELAY_SECONDS:5}
app.ai.knowledge-relation.recovery-interval=${APP_AI_KNOWLEDGE_RELATION_RECOVERY_INTERVAL:30s}
app.ai.knowledge-relation.recovery-batch-size=${APP_AI_KNOWLEDGE_RELATION_RECOVERY_BATCH_SIZE:8}
app.ai.question-answer.task-lease=${APP_AI_QUESTION_ANSWER_TASK_LEASE:2m}
app.ai.question-answer.max-attempts=${APP_AI_QUESTION_ANSWER_MAX_ATTEMPTS:5}
app.ai.question-answer.dispatch-retry-after-seconds=${APP_AI_QUESTION_ANSWER_DISPATCH_RETRY_AFTER_SECONDS:5}
app.ai.question-answer.analyzer.model=${APP_AI_QUESTION_ANALYZER_MODEL:apac.amazon.nova-micro-v1:0}
app.ai.question-answer.analyzer.analysis-version=${APP_AI_QUESTION_ANALYZER_ANALYSIS_VERSION:question-query-analysis-v1}
app.ai.question-answer.analyzer.max-tokens=${APP_AI_QUESTION_ANALYZER_MAX_TOKENS:512}
app.ai.question-answer.analyzer.bedrock-region=${APP_AI_BEDROCK_REGION:${APP_AI_REPORT_BEDROCK_REGION:ap-northeast-2}}
app.ai.question-answer.analyzer.model-timeout=${APP_AI_BEDROCK_TIMEOUT:${APP_AI_REPORT_MODEL_TIMEOUT:30s}}
app.ai.question-answer.embedding.model-timeout=${APP_AI_QUESTION_EMBEDDING_MODEL_TIMEOUT:10s}
app.ai.question-answer.embedding.total-attempts=${APP_AI_QUESTION_EMBEDDING_TOTAL_ATTEMPTS:1}
app.ai.question-answer.generation.primary-model=${APP_AI_QUESTION_GENERATION_NOVA_MODEL:apac.amazon.nova-micro-v1:0}
app.ai.question-answer.generation.fallback-model=${APP_AI_QUESTION_GENERATION_GEMINI_MODEL:gemini-3.1-flash-lite}
app.ai.question-answer.generation.prompt-version=${APP_AI_QUESTION_GENERATION_PROMPT_VERSION:question-local-answer-v1}
app.ai.question-answer.generation.max-tokens=${APP_AI_QUESTION_GENERATION_MAX_TOKENS:1024}
app.ai.question-answer.generation.model-timeout=${APP_AI_QUESTION_GENERATION_MODEL_TIMEOUT:30s}
app.ai.question-answer.grounding.validation-prompt-version=${APP_AI_QUESTION_GROUNDING_VALIDATION_PROMPT_VERSION:question-grounding-validation-v1}
app.ai.question-answer.grounding.repair-prompt-version=${APP_AI_QUESTION_GROUNDING_REPAIR_PROMPT_VERSION:question-grounding-repair-v1}
app.ai.question-answer.grounding.validation-max-tokens=${APP_AI_QUESTION_GROUNDING_VALIDATION_MAX_TOKENS:512}
app.ai.question-answer.grounding.repair-max-tokens=${APP_AI_QUESTION_GROUNDING_REPAIR_MAX_TOKENS:1024}
app.ai.question-answer.grounding.model-timeout=${APP_AI_QUESTION_GROUNDING_MODEL_TIMEOUT:30s}
app.ai.question-answer.web-grounding.model=${APP_AI_QUESTION_WEB_GROUNDING_MODEL:gemini-3.1-flash-lite}
app.ai.question-answer.web-grounding.prompt-version=${APP_AI_QUESTION_WEB_GROUNDING_PROMPT_VERSION:question-web-grounding-v1}
app.ai.question-answer.web-grounding.max-tokens=${APP_AI_QUESTION_WEB_GROUNDING_MAX_TOKENS:1024}
app.ai.question-answer.web-grounding.model-timeout=${APP_AI_QUESTION_WEB_GROUNDING_MODEL_TIMEOUT:45s}
app.ai.question-answer.ungrounded.model=${APP_AI_QUESTION_UNGROUNDED_MODEL:${APP_AI_QUESTION_GENERATION_GEMINI_MODEL:gemini-3.1-flash-lite}}
app.ai.question-answer.ungrounded.prompt-version=${APP_AI_QUESTION_UNGROUNDED_PROMPT_VERSION:question-ungrounded-answer-v1}
app.ai.question-answer.ungrounded.max-tokens=${APP_AI_QUESTION_UNGROUNDED_MAX_TOKENS:1024}
app.ai.question-answer.ungrounded.model-timeout=${APP_AI_QUESTION_UNGROUNDED_MODEL_TIMEOUT:30s}
app.ai.question-answer.callback.base-origin=${APP_AI_QUESTION_CALLBACK_BASE_ORIGIN:}
app.ai.question-answer.callback.allowed-origins=${APP_AI_QUESTION_CALLBACK_ALLOWED_ORIGINS:}
app.ai.question-answer.callback.internal-token=${APP_AI_INTERNAL_CALLBACK_TOKEN:}
app.ai.question-answer.callback.connect-timeout=${APP_AI_QUESTION_CALLBACK_CONNECT_TIMEOUT:2s}
app.ai.question-answer.callback.read-timeout=${APP_AI_QUESTION_CALLBACK_READ_TIMEOUT:5s}
app.ai.report.image-max-bytes=${APP_AI_REPORT_IMAGE_MAX_BYTES:3750000}
app.ai.report.image-max-total-bytes=${APP_AI_REPORT_IMAGE_MAX_TOTAL_BYTES:15000000}
app.ai.report.image-allowed-hosts=${APP_AI_REPORT_IMAGE_ALLOWED_HOSTS:}
app.ai.report.image-download-timeout=${APP_AI_REPORT_IMAGE_DOWNLOAD_TIMEOUT:5s}
app.ai.report.gemini-model=${APP_AI_REPORT_GEMINI_MODEL:gemini-3.1-flash-lite}
app.ai.report.nova-model=${APP_AI_REPORT_NOVA_MODEL:apac.amazon.nova-lite-v1:0}
app.ai.report.bedrock-region=${APP_AI_BEDROCK_REGION:${APP_AI_REPORT_BEDROCK_REGION:ap-northeast-2}}
app.ai.report.model-timeout=${APP_AI_BEDROCK_TIMEOUT:${APP_AI_REPORT_MODEL_TIMEOUT:30s}}
app.ai.report.prompt-version=${APP_AI_REPORT_PROMPT_VERSION:report-review-v1}

spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:bedrock-converse}
spring.ai.bedrock.aws.region=${APP_AI_BEDROCK_REGION:${APP_AI_REPORT_BEDROCK_REGION:ap-northeast-2}}
spring.ai.bedrock.aws.profile.name=${APP_AI_BEDROCK_PROFILE:}
spring.ai.bedrock.aws.timeout=${APP_AI_BEDROCK_TIMEOUT:${APP_AI_REPORT_MODEL_TIMEOUT:30s}}
spring.ai.bedrock.converse.chat.options.model=${APP_AI_REPORT_NOVA_MODEL:apac.amazon.nova-lite-v1:0}
