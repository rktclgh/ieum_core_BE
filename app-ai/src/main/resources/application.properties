spring.application.name=ieum-ai
spring.config.import=optional:file:./app-ai/.env[.properties],optional:file:./.env[.properties]
server.port=8080

# DB 접속 정보는 컨테이너 환경변수(.env)로 주입한다.
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.sql.init.mode=never

app.ai.database.embedding-dimensions=768
app.ai.database.required-extensions=vector,postgis,pgcrypto

app.ai.features.report-review-enabled=${APP_AI_FEATURES_REPORT_REVIEW_ENABLED:false}
app.ai.features.question-discovery-enabled=${APP_AI_FEATURES_QUESTION_DISCOVERY_ENABLED:false}
app.ai.question.discovery.batch-size=${APP_AI_QUESTION_DISCOVERY_BATCH_SIZE:20}
app.ai.question.discovery.fixed-delay=${APP_AI_QUESTION_DISCOVERY_FIXED_DELAY:5s}
app.ai.report.image-max-bytes=${APP_AI_REPORT_IMAGE_MAX_BYTES:3750000}
app.ai.report.image-max-total-bytes=${APP_AI_REPORT_IMAGE_MAX_TOTAL_BYTES:15000000}
app.ai.report.image-allowed-hosts=${APP_AI_REPORT_IMAGE_ALLOWED_HOSTS:}
app.ai.report.image-download-timeout=${APP_AI_REPORT_IMAGE_DOWNLOAD_TIMEOUT:5s}
app.ai.report.gemini-api-key=${APP_AI_REPORT_GEMINI_API_KEY:${GOOGLE_API_KEY:}}
app.ai.report.gemini-model=${APP_AI_REPORT_GEMINI_MODEL:gemini-3.1-flash-lite}
app.ai.report.nova-model=${APP_AI_REPORT_NOVA_MODEL:amazon.nova-lite-v1:0}
app.ai.report.bedrock-region=${APP_AI_REPORT_BEDROCK_REGION:ap-southeast-2}
app.ai.report.model-timeout=${APP_AI_REPORT_MODEL_TIMEOUT:30s}
app.ai.report.prompt-version=${APP_AI_REPORT_PROMPT_VERSION:report-review-v1}

spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:bedrock-converse}
spring.ai.bedrock.aws.region=${APP_AI_REPORT_BEDROCK_REGION:ap-southeast-2}
spring.ai.bedrock.aws.timeout=${APP_AI_REPORT_MODEL_TIMEOUT:30s}
spring.ai.bedrock.converse.chat.options.model=${APP_AI_REPORT_NOVA_MODEL:amazon.nova-lite-v1:0}
