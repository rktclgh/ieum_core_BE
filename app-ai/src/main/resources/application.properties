spring.application.name=ieum-ai
spring.config.import=optional:file:./app-ai/.env[.properties],optional:file:./.env[.properties]
server.port=8080

# DB 접속 정보는 컨테이너 환경변수(.env)로 주입한다.
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Postgres native enum 캐스팅 타입명을 snake_case 로 렌더(app-main과 동일 — 공유 common 엔티티).
spring.jpa.properties.hibernate.dialect=shinhan.fibri.ieum.common.config.SnakeCasePostgreSQLDialect
