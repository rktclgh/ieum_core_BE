spring.application.name=ieum-ai
spring.config.import=optional:file:./app-ai/.env[.properties],optional:file:./.env[.properties]
server.port=8080

# DB 접속 정보는 컨테이너 환경변수(.env)로 주입한다.
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.sql.init.mode=never

app.ai.database.embedding-dimensions=768
app.ai.database.required-extensions=vector,postgis,pgcrypto

ieum.internal.hmac.service-name=${IEUM_INTERNAL_HMAC_SERVICE_NAME:app-main}
ieum.internal.hmac.current-key-id=${IEUM_INTERNAL_HMAC_CURRENT_KEY_ID:}
ieum.internal.hmac.current-secret-base64=${IEUM_INTERNAL_HMAC_CURRENT_SECRET_BASE64:}
ieum.internal.hmac.previous-key-id=${IEUM_INTERNAL_HMAC_PREVIOUS_KEY_ID:}
ieum.internal.hmac.previous-secret-base64=${IEUM_INTERNAL_HMAC_PREVIOUS_SECRET_BASE64:}
ieum.internal.hmac.clock-skew-seconds=${IEUM_INTERNAL_HMAC_CLOCK_SKEW_SECONDS:60}
ieum.internal.hmac.max-body-bytes=${IEUM_INTERNAL_HMAC_MAX_BODY_BYTES:1048576}
ieum.internal.hmac.replay-max-entries=${IEUM_INTERNAL_HMAC_REPLAY_MAX_ENTRIES:10000}
ieum.internal.hmac.replay-ttl-seconds=${IEUM_INTERNAL_HMAC_REPLAY_TTL_SECONDS:120}
